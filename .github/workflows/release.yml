name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. 3.0.11-beta.12)'
        required: true
        default: '3.0.11-beta.12'
      name:
        description: 'Release name (e.g. v3.0.11 Beta 12)'
        required: true
        default: 'v3.0.11 Beta 12'
      body:
        description: 'Release notes'
        required: false
        default: 'Normalize device string color modes to ColorMode enum; fix color_mode coercion and type annotation for HA 2026.3 compatibility.'
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: 'true'
  push:
    branches:
      - dev_v3
    paths:
      - 'custom_components/uniled/manifest.json'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release parameters
        id: params
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_NAME: ${{ github.event.inputs.name }}
          INPUT_BODY: ${{ github.event.inputs.body }}
          INPUT_PRERELEASE: ${{ github.event.inputs.prerelease }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
            echo "name=$INPUT_NAME" >> "$GITHUB_OUTPUT"
            echo "body=$INPUT_BODY" >> "$GITHUB_OUTPUT"
            echo "prerelease=$INPUT_PRERELEASE" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(jq -r '.version' custom_components/uniled/manifest.json)
            VERSION_ESC=$(printf '%s' "$VERSION" | sed 's/\./\\./g')
            LAST_BETA=$(git tag --list "${VERSION}-beta.*" | sed "s/${VERSION_ESC}-beta\.//" | grep -E '^[0-9]+$' | sort -n | tail -1)
            LAST_BETA=${LAST_BETA:-0}
            NEXT_BETA=$(( LAST_BETA + 1 ))
            TAG="${VERSION}-beta.${NEXT_BETA}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "name=v${VERSION} Beta ${NEXT_BETA}" >> "$GITHUB_OUTPUT"
            echo "body=Release ${VERSION} Beta ${NEXT_BETA}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        env:
          TAG: ${{ steps.params.outputs.tag }}
          NAME: ${{ steps.params.outputs.name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$NAME"
          git push origin "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.params.outputs.tag }}
          NAME: ${{ steps.params.outputs.name }}
          BODY: ${{ steps.params.outputs.body }}
          PRERELEASE: ${{ steps.params.outputs.prerelease }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG" \
            --title "$NAME" \
            --notes "$BODY" \
            $PRERELEASE_FLAG
