name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. 3.0.11-beta.12)'
        required: true
        default: '3.0.11-beta.12'
      name:
        description: 'Release name (e.g. v3.0.11 Beta 12)'
        required: true
        default: 'v3.0.11 Beta 12'
      body:
        description: 'Release notes'
        required: false
        default: 'Normalize device string color modes to ColorMode enum; fix color_mode coercion and type annotation for HA 2026.3 compatibility.'
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ github.event.inputs.tag }}" -m "${{ github.event.inputs.name }}"
          git push origin "${{ github.event.inputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ github.event.inputs.tag }}" \
            --title "${{ github.event.inputs.name }}" \
            --notes "${{ github.event.inputs.body }}" \
            $PRERELEASE_FLAG
