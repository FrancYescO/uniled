name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. 3.0.11-beta.12)'
        required: true
        default: '3.0.11-beta.12'
      name:
        description: 'Release name (e.g. v3.0.11 Beta 12)'
        required: true
        default: 'v3.0.11 Beta 12'
      body:
        description: 'Release notes'
        required: false
        default: 'Normalize device string color modes to ColorMode enum; fix color_mode coercion and type annotation for HA 2026.3 compatibility.'
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ github.event.inputs.tag }}" -m "${{ github.event.inputs.name }}"
          git push origin "${{ github.event.inputs.tag }}"

      - name: Create GitHub release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.tag }}
          release_name: ${{ github.event.inputs.name }}
          body: ${{ github.event.inputs.body }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
